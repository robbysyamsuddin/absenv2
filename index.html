<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Absen Madrasah</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
    #reader { border: none !important; border-radius: 1.5rem; overflow: hidden; background: #000; }
    #reader video { object-fit: cover !important; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
  <div class="max-w-md w-full bg-white rounded-[2.5rem] shadow-2xl p-8 text-center border border-slate-100">
    <div class="mb-6">
      <h1 class="text-2xl font-bold text-slate-800">E-Absen Madrasah</h1>
      <p class="text-slate-500 text-sm mt-1">Arahkan kamera ke QR Code Guru Anda</p>
    </div>

    <div id="reader" class="w-full aspect-square mb-4"></div>

    <div id="statusBox" class="hidden p-4 rounded-2xl text-sm font-semibold mb-4">
      <p id="statusText"></p>
    </div>
    <p class="text-xs text-slate-400">Pastikan izin kamera di-Allow agar langsung aktif otomatis</p>
  </div>

  <script>
    // ⚠️ MASUKKAN URL GOOGLE SCRIPT WEB APP ANDA DI SINI
    const GAS_URL = "https://script.google.com/macros/s/AKfycbx0w3eyiP3bRs0HoyZoRbH6Y-aijP33s4yjiFyb0x4pRnZ7EFsm4QsvqgZ07167CdCgiQ/exec";

    const statusBox = document.getElementById('statusBox');
    const statusText = document.getElementById('statusText');
    let isProcessing = false;

    function onScanSuccess(decodedText) {
      if (isProcessing) return;
      isProcessing = true;

      statusBox.className = "p-4 rounded-2xl text-sm font-semibold block bg-indigo-50 text-indigo-700 animate-pulse";
      statusText.innerText = "⏳ Memproses data absensi...";

      fetch(`${GAS_URL}?data=${encodeURIComponent(decodedText)}`)
        .then(response => response.text())
        .then(responseText => {
          statusBox.className = "p-4 rounded-2xl text-sm font-semibold block " + 
            (responseText.includes("BERHASIL") ? "bg-green-100 text-green-700" : "bg-red-100 text-red-700");
          statusText.innerText = responseText;
          
          setTimeout(() => { isProcessing = false; statusBox.className = "hidden"; }, 5000);
        })
        .catch(err => {
          statusBox.className = "p-4 rounded-2xl text-sm font-semibold block bg-red-100 text-red-700";
          statusText.innerText = "❌ Gagal mengirim, coba scan ulang.";
          isProcessing = false;
        });
    }

    const html5QrCode = new Html5Qrcode("reader");
    const config = { fps: 20, qrbox: { width: 250, height: 250 }, aspectRatio: 1.0 };

    window.addEventListener('DOMContentLoaded', () => {
      html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess)
        .catch(err => {
          statusBox.className = "p-4 rounded-2xl text-sm font-semibold block bg-amber-50 text-amber-700";
          statusText.innerText = "Mohon berikan akses kamera (Klik Allow) untuk memulai.";
        });
    });
  </script>
</body>
</html>
